<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影石 Insta360 — 全国门店数据看板</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
  color: #333; height: 100vh; overflow: hidden;
}
#app { display: flex; height: 100vh; }

/* 左侧面板 */
#sidebar {
  width: 420px; min-width: 420px;
  background: #fff;
  display: flex; flex-direction: column;
  border-right: 1px solid #e8e8e8;
  z-index: 10; overflow: hidden;
  box-shadow: 2px 0 20px rgba(0,0,0,0.08);
}
#header {
  padding: 18px 20px;
  background: linear-gradient(135deg, #667eea 0%, #00d6ca 50%, #009688 100%);
  color: #fff; flex-shrink: 0;
}
#header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
#header .subtitle { font-size: 12px; opacity: 0.9; margin-top: 4px; }

/* 统计卡片 */
#stats-bar {
  display: flex; gap: 8px; padding: 12px 16px;
  background: linear-gradient(180deg, #f0f4ff 0%, #f7f9fc 100%);
  flex-shrink: 0; flex-wrap: wrap;
}
.stat-card {
  flex: 1; min-width: 70px; text-align: center;
  padding: 12px 6px; background: #fff;
  border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border-top: 3px solid #ccc; transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card:nth-child(1) { border-top-color: #00d6ca; }
.stat-card:nth-child(2) { border-top-color: #667eea; }
.stat-card:nth-child(3) { border-top-color: #f093fb; }
.stat-card:nth-child(4) { border-top-color: #fa709a; }
.stat-card .num { font-size: 22px; font-weight: 700; }
.stat-card:nth-child(1) .num { color: #009688; }
.stat-card:nth-child(2) .num { color: #667eea; }
.stat-card:nth-child(3) .num { color: #c471ed; }
.stat-card:nth-child(4) .num { color: #fa709a; }
.stat-card .label { font-size: 11px; color: #999; margin-top: 2px; }

/* 筛选区 */
#filters {
  padding: 12px 16px; display: flex; flex-direction: column;
  gap: 8px; flex-shrink: 0;
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, #00d6ca, #667eea, #fa709a) 1;
}
.filter-row { display: flex; gap: 8px; align-items: center; }
.filter-row select, .filter-row input {
  flex: 1; padding: 8px 10px;
  background: #f7f9fc; color: #333;
  border: 1px solid #e0e0e0; border-radius: 8px;
  font-size: 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.filter-row select:focus, .filter-row input:focus {
  border-color: #00d6ca;
  box-shadow: 0 0 0 3px rgba(0,214,202,0.12);
}
.filter-row input::placeholder { color: #bbb; }
.btn {
  padding: 8px 16px;
  background: linear-gradient(135deg, #00d6ca, #009688);
  color: #fff; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,214,202,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,214,202,0.4); }
.btn-outline {
  background: #fff; border: 2px solid #00d6ca; color: #00d6ca;
  box-shadow: none;
}
.btn-outline:hover { background: #e6f9f8; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
#result-count { font-size: 12px; color: #667eea; text-align: right; font-weight: 600; }

/* 门店列表 */
#store-list-wrapper { flex: 1; overflow-y: auto; padding: 0; }
#store-list-wrapper::-webkit-scrollbar { width: 6px; }
#store-list-wrapper::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #00d6ca, #667eea);
  border-radius: 3px;
}
.store-item {
  padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
  border-left: 3px solid transparent;
  cursor: pointer; transition: background 0.15s, border-left-color 0.2s;
}
.store-item:hover { background: #f5f7fa; border-left-color: #00d6ca; }
.store-item.active { background: #e6f7f7; border-left: 3px solid #00d6ca; }
.store-item .name { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 4px; }
.store-item .address { font-size: 12px; color: #999; line-height: 1.5; margin-bottom: 4px; }
.store-item .meta { font-size: 11px; color: #aaa; display: flex; gap: 12px; }

/* 视图切换 */
#view-tabs { display: flex; gap: 4px; padding: 8px 16px; flex-shrink: 0; }
.tab-btn {
  flex: 1; padding: 10px; background: #f0f0f0; color: #888;
  border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; text-align: center; transition: all 0.2s; font-weight: 500;
}
.tab-btn:hover { background: #e8e8e8; color: #555; }
.tab-btn.active {
  background: linear-gradient(135deg, #667eea, #00d6ca);
  color: #fff; font-weight: 700; box-shadow: 0 3px 10px rgba(102,126,234,0.35);
}

/* 图表区 */
#chart-view { display: none; flex: 1; overflow-y: auto; padding: 16px; }
#chart-view.active { display: block; }
.chart-section {
  background: #fff; border-radius: 12px; padding: 18px;
  margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  position: relative; overflow: hidden;
}
.chart-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.chart-section:nth-child(1)::before { background: linear-gradient(90deg, #00d6ca, #667eea); }
.chart-section:nth-child(2)::before { background: linear-gradient(90deg, #fa709a, #f093fb); }
.chart-section:nth-child(3)::before { background: linear-gradient(90deg, #667eea, #00d6ca); }
.chart-section h3 { font-size: 15px; color: #333; margin-bottom: 14px; }
.chart-wrap { position: relative; height: 320px; }
.chart-wrap-lg { height: 420px; }

/* 右侧地图 */
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Popup */
.leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; min-width: 220px; }
.popup-name { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 6px; }
.popup-info { font-size: 12px; color: #666; line-height: 1.6; }

/* 手机适配 */
@media (max-width: 768px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; min-width: 100%; max-height: 55vh; }
  #map-container { height: 45vh; }
}
/* Loading */
#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.95);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column;
}
#loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid transparent;
  border-top-color: #667eea;
  border-right-color: #00d6ca;
  border-bottom-color: #fa709a;
  border-left-color: #f093fb;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#loading .text { color: #999; margin-top: 14px; font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 图层控制面板 - 浮动在地图左上角 */
#layer-control {
  position: absolute; top: 14px; left: 14px; z-index: 1000;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(8px);
  border-radius: 12px; padding: 12px 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  min-width: 170px;
  border: 1px solid rgba(255,255,255,0.3);
}
#layer-control .lc-title {
  font-size: 12px; font-weight: 700; color: #666;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid #eee;
}
.lc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 4px; cursor: pointer;
  border-radius: 6px; transition: background 0.15s;
  font-size: 13px; color: #333;
}
.lc-item:hover { background: #f0f4ff; }
.lc-item input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: #667eea; cursor: pointer;
}
.lc-item .lc-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  color: #fff; font-weight: 600; margin-left: auto;
}
.badge-heat { background: #e74c3c; }
.badge-buffer { background: #3498db; }
.badge-voronoi { background: #9b59b6; }
#buffer-radius {
  margin-left: 24px; display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: #888;
}
#buffer-radius select {
  font-size: 11px; padding: 2px 4px; border: 1px solid #ddd; border-radius: 4px;
  background: #fff; cursor: pointer;
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="text">正在加载门店数据…</div></div>

<div id="app">
  <!-- 左侧面板 -->
  <div id="sidebar">
    <div id="header">
      <h1>影石 Insta360 · 门店数据看板</h1>
      <div class="subtitle">共 <span id="total-num"></span> 家门店 · <span id="total-prov"></span> 省 · <span id="total-city"></span> 市</div>
    </div>

    <div id="stats-bar">
      <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">总门店</div></div>
      <div class="stat-card"><div class="num" id="stat-prov">—</div><div class="label">省份</div></div>
      <div class="stat-card"><div class="num" id="stat-city">—</div><div class="label">城市</div></div>
      <div class="stat-card"><div class="num" id="stat-phone">—</div><div class="label">有电话</div></div>
    </div>

    <div id="view-tabs">
      <button class="tab-btn active" onclick="switchView('list')">地图视图</button>
      <button class="tab-btn" onclick="switchView('chart')">统计图表</button>
    </div>

    <div id="filters">
      <div class="filter-row">
        <select id="filter-province" onchange="onFilterChange()">
          <option value="">全部省份</option>
        </select>
        <select id="filter-city" onchange="onFilterChange()">
          <option value="">全部城市</option>
        </select>
      </div>
      <div class="filter-row">
        <input type="text" id="filter-search" placeholder="搜索门店名称或地址…" oninput="onFilterChange()">
        <button class="btn btn-sm btn-outline" onclick="resetFilters()">重置</button>
      </div>
      <div id="result-count"></div>
    </div>

    <div id="store-list-wrapper"></div>

    <div id="chart-view">
      <div class="chart-section">
        <h3>各省份门店数量 TOP 15</h3>
        <div class="chart-wrap"><canvas id="chart-province"></canvas></div>
      </div>
      <div class="chart-section">
        <h3>城市门店数量 TOP 20</h3>
        <div class="chart-wrap"><canvas id="chart-city"></canvas></div>
      </div>
      <div class="chart-section">
        <h3>全国门店分布</h3>
        <div class="chart-wrap-lg"><canvas id="chart-heatmap"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 右侧地图 -->
  <div id="map-container">
    <div id="map"></div>
    <!-- 图层控制面板 -->
    <div id="layer-control">
      <div class="lc-title">分析图层</div>
      <label class="lc-item">
        <input type="checkbox" id="chk-heat" onchange="toggleHeatmap()">
        🔥 热力图 <span class="lc-badge badge-heat">HOT</span>
      </label>
      <label class="lc-item">
        <input type="checkbox" id="chk-buffer" onchange="toggleBuffer()">
        ⭕ 缓冲区 <span class="lc-badge badge-buffer">ZONE</span>
      </label>
      <div id="buffer-radius">
        <span>半径:</span>
        <select id="buffer-dist" onchange="toggleBuffer()">
          <option value="1000">1 km</option>
          <option value="3000" selected>3 km</option>
          <option value="5000">5 km</option>
          <option value="10000">10 km</option>
        </select>
      </div>
      <label class="lc-item">
        <input type="checkbox" id="chk-voronoi" onchange="toggleVoronoi()">
        🕸️ 服务区 <span class="lc-badge badge-voronoi">VOR</span>
      </label>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

let map, markerCluster, currentView = 'list';
let heatLayer = null, bufferLayer = null, voronoiLayer = null;

let provinceGeo = null; // 省份边界 GeoJSON

// ============ 初始化 ============
function init() {
  try {
    buildProvinceFilter();
    initMap();
    renderStoreList(ALL_STORES);
    updateStats(ALL_STORES);
    document.getElementById('loading').style.display = 'none';
    // 等布局稳定后刷新地图尺寸
    setTimeout(function() {
      if (map) map.invalidateSize();
    }, 500);
    // 异步加载省份边界数据（用于 Voronoi 裁剪）
    loadProvinceBoundaries();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#e74c3c;font-size:16px;">加载出错: ' + e.message + '<br><span style="font-size:13px;color:#999;">请检查控制台(F12)查看具体错误</span></div>';
    console.error('[Init Error]', e);
  }
}

// ============ 加载省份边界（100000_full.json 含各省详情） ============
function loadProvinceBoundaries() {
  provinceGeo = null;
  window._chinaBoundary = null;
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
    .then(function(r) { return r.json(); })
    .then(function(geo) {
      provinceGeo = geo;
      computeChinaBoundary(geo);
      if (window._voronoiPending) {
        window._voronoiPending = false;
        var vcb = document.getElementById('chk-voronoi');
        if (vcb && !vcb.checked) { vcb.checked = true; voronoiActive = true; toggleVoronoi(); }
      }
    })
    .catch(function(err) {
      console.warn('[WARN] 边界加载失败:', err.message);
      provinceGeo = { features: [] }; window._chinaBoundary = null;
    });
}
function computeChinaBoundary(geo) {
  var polys = [];
  for (var i = 0; i < geo.features.length; i++) {
    var cp = geoToClipPoly(geo.features[i].geometry);
    if (cp) polys.push(cp);
  }
  if (polys.length < 2) { window._chinaBoundary = null; return; }
  try { window._chinaBoundary = polygonClipping.union.apply(null, polys); }
  catch(e) { window._chinaBoundary = null; }
}
function geoToClipPoly(geom) {
  if (!geom) return null;
  var rings = [];
  if (geom.type === 'Polygon') {
    for (var r = 0; r < geom.coordinates.length; r++)
      rings.push(geom.coordinates[r].map(function(p) { return [p[0], p[1]]; }));
  } else if (geom.type === 'MultiPolygon') {
    for (var i = 0; i < geom.coordinates.length; i++)
      for (var r = 0; r < geom.coordinates[i].length; r++)
        rings.push(geom.coordinates[i][r].map(function(p) { return [p[0], p[1]]; }));
  }
  return rings.length > 0 ? rings : null;
}
function getProvBoundary(provName) {
  if (!provinceGeo || !provinceGeo.features) return null;
  for (var i = 0; i < provinceGeo.features.length; i++) {
    var f = provinceGeo.features[i];
    if (f.properties && f.properties.name === provName) return f.geometry;
  }
  return null;
}

// ============ 地图初始化（高德底图） ============
function initMap() {
  map = L.map('map', {
    center: [35.0, 105.0],
    zoom: 5,
    zoomControl: true,
  });

  // 高德地图瓦片（国内加载快，无需注册）
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: '1234',
    attribution: '© 高德地图',
    maxZoom: 18
  }).addTo(map);

  renderMarkers(ALL_STORES);
}

// ============ 渲染 Marker ============
function renderMarkers(stores) {
  if (markerCluster) {
    map.removeLayer(markerCluster);
  }

  var markers = [];
  stores.forEach(function(store, idx) {
    if (!store.lng || !store.lat) return;

    var isOpen = store.status === '营业中';
    var icon = L.divIcon({
      className: '',
      html: '<div style="'
        + 'width:14px; height:14px; border-radius:50%;'
        + 'background:' + (isOpen ? '#00d6ca' : '#ccc') + ';'
        + 'border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.3);'
      + '" title="' + store.storeName + '"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    var marker = L.marker([store.lat, store.lng], { icon });
    const popupHtml = `
      <div class="popup-name">${store.storeName}</div>
      <div class="popup-info">
        <div>${store.address || '—'}</div>
        <div>${store.phone || '暂无'}</div>
        <div>${store.hours || '—'}</div>
        <div>' + (store.city === '市辖区' ? store.province : store.city) + '（' + store.province + '）</div>
        <div>状态：<b style="color:${isOpen ? 'green' : 'red'}">${store.status || '—'}</b></div>
      </div>
    `;
    marker.bindPopup(popupHtml, { maxWidth: 280 });
    marker.on('click', () => {
      // 高亮列表对应项
    });
    markers.push(marker);
  });

  markerCluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    disableClusteringAtZoom: 10,
    spiderfyOnMaxZoom: true,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      let color, size;
      if (count < 10) { color = '#00d6ca'; size = 36; }
      else if (count < 30) { color = '#667eea'; size = 44; }
      else { color = '#fa709a'; size = 52; }
      return L.divIcon({
        html: `<div style="
          width:${size}px; height:${size}px; border-radius:50%;
          background:${color}; color:#fff; font-weight:700; font-size:13px;
          display:flex; align-items:center; justify-content:center;
          box-shadow:0 2px 8px rgba(0,0,0,0.25);
          border:2px solid #fff;
        ">${count}</div>`,
        className: '',
        iconSize: [size, size]
      });
    }
  });

  markers.forEach(m => markerCluster.addLayer(m));
  map.addLayer(markerCluster);
}

// ============ 热力图 ============
function buildHeatData(stores) {
  return stores.filter(s => s.lng && s.lat).map(s => [s.lat, s.lng, 0.6]);
}
function toggleHeatmap(stores) {
  stores = stores || ALL_STORES;
  var cb = document.getElementById('chk-heat');
  heatActive = cb.checked;
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  if (heatActive) {
    var pts = buildHeatData(stores);
    heatLayer = L.heatLayer(pts, {
      radius: 30, blur: 20, maxZoom: 12,
      gradient: { 0.2: '#00d6ca', 0.4: '#ffd93d', 0.6: '#fa709a', 0.8: '#e74c3c', 1.0: '#c0392b' }
    });
    map.addLayer(heatLayer);
  }
}

// ============ 缓冲区 ============
function toggleBuffer(stores) {
  stores = stores || ALL_STORES;
  var cb = document.getElementById('chk-buffer');
  bufferActive = cb.checked;
  var radius = parseInt(document.getElementById('buffer-dist').value);
  if (bufferLayer) { map.removeLayer(bufferLayer); bufferLayer = null; }
  bufferLayer = L.layerGroup();
  if (bufferActive) {
    stores.filter(s => s.lng && s.lat).forEach(function(s) {
      var c = L.circle([s.lat, s.lng], {
        radius: radius,
        color: '#3498db', fillColor: '#3498db',
        fillOpacity: 0.08, weight: 1, opacity: 0.3
      });
      bufferLayer.addLayer(c);
    });
    map.addLayer(bufferLayer);
  }
}

// ============ Voronoi 服务区分析（按省界裁剪） ============
function buildVoronoiData(stores) {
  var pts = stores.filter(function(s) { return s.lng && s.lat; });
  if (pts.length < 3) return null;
  var coords = pts.map(function(s) { return [s.lng, s.lat]; });
  var delaunay = d3.Delaunay.from(coords);
  var voronoi = delaunay.voronoi([73, 3, 136, 54]);
  var polygons = [];

  for (var i = 0; i < pts.length; i++) {
    var cell = voronoi.cellPolygon(i);
    if (!cell) continue;

    // 第一步：用该门店所属省份的行政边界裁剪
    var clipped = clipCellByProvince(cell, pts[i].province);
    if (clipped && clipped.length >= 3) {
      polygons.push({ latlngs: clipped, store: pts[i] });
      continue;
    }

    // 兜底：用中国陆域裁剪
    if (window._chinaBoundary) {
      var cellPoly = [cell.map(function(p) { return [p[0], p[1]]; })];
      try {
        var clipped2 = polygonClipping.intersection(cellPoly, window._chinaBoundary);
        if (clipped2 && clipped2.length > 0 && clipped2[0].length >= 3) {
          polygons.push({ latlngs: clipped2[0].map(function(p) { return [p[1], p[0]]; }), store: pts[i] });
          continue;
        }
      } catch(e) {}
    }

    // 最终兜底：原始 Voronoi
    var latlngs = cell.map(function(p) { return [p[1], p[0]]; });
    polygons.push({ latlngs: latlngs, store: pts[i] });
  }
  return polygons;
}

// 用省份边界裁剪 Voronoi cell
function clipCellByProvince(cellPoints, provName) {
  var provGeom = getProvBoundary(provName);
  if (!provGeom) return null;
  var clipPoly = geoToClipPoly(provGeom);
  if (!clipPoly) return null;
  var cellPoly = [cellPoints.map(function(p) { return [p[0], p[1]]; })];
  try {
    var clipped = polygonClipping.intersection(cellPoly, clipPoly);
    if (clipped && clipped.length > 0 && clipped[0].length >= 3) {
      return clipped[0].map(function(p) { return [p[1], p[0]]; });
    }
  } catch(e) {}
  return null;
}

function toggleVoronoi(stores) {
  stores = stores || ALL_STORES;
  var cb = document.getElementById('chk-voronoi');
  voronoiActive = cb.checked;

  // 如果省份边界还没加载完，显示提示
  if (voronoiActive && provinceGeo === null) {
    if (!document.getElementById('voronoi-loading')) {
      var tip = document.createElement('div');
      tip.id = 'voronoi-loading';
      tip.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:1001;';
      tip.textContent = '正在加载省界数据，请稍候…';
      document.getElementById('map-container').appendChild(tip);
    }
    // 取消勾选，标记等边界加载完后自动重试
    cb.checked = false;
    voronoiActive = false;
    window._voronoiPending = true;
    return;
  }

  var tip = document.getElementById('voronoi-loading');
  if (tip) tip.remove();

  if (voronoiLayer) { map.removeLayer(voronoiLayer); voronoiLayer = null; }
  voronoiLayer = L.layerGroup();
  if (voronoiActive) {
    var polygons = buildVoronoiData(stores);
    if (polygons) {
      polygons.forEach(function(p) {
        var hue = (p.store.city.charCodeAt(0) * 37 + p.store.province.charCodeAt(0) * 13) % 360;
        var poly = L.polygon(p.latlngs, {
          color: 'hsl(' + hue + ', 65%, 50%)',
          fillColor: 'hsl(' + hue + ', 60%, 85%)',
          fillOpacity: 0.25, weight: 1.5, opacity: 0.5
        });
        poly.bindPopup('<b>' + p.store.storeName + '</b><br>省界裁剪·服务覆盖区');
        voronoiLayer.addLayer(poly);
      });
    }
    map.addLayer(voronoiLayer);
  }
}

// ============ 左侧列表渲染 ============
function renderStoreList(stores) {
  const wrapper = document.getElementById('store-list-wrapper');
  wrapper.innerHTML = '';

  if (stores.length === 0) {
    wrapper.innerHTML = '<div style="padding:40px;text-align:center;color:#999;">暂无匹配的门店</div>';
    return;
  }

  stores.forEach((store, idx) => {
    const div = document.createElement('div');
    div.className = 'store-item';
    div.onclick = () => {
      if (store.lng && store.lat) {
        map.flyTo([store.lat, store.lng], 14);
      }
    };
    div.innerHTML = `
      <div class="name">${store.storeName || '—'}</div>
      <div class="address">${store.address || '—'}</div>
      <div class="meta">
        <span>${store.phone || '暂无'}</span>
        <span>${store.city === '市辖区' ? store.province : store.city}</span>
        <span style="color:${store.status === '营业中' ? '#009688' : '#999'}">${store.status || '—'}</span>
      </div>
    `;
    wrapper.appendChild(div);
  });
}

// ============ 统计更新 ============
function updateStats(stores) {
  const provinces = new Set(stores.map(s => s.province).filter(Boolean));
  const cities = new Set(stores.map(s => s.city).filter(Boolean));
  const hasPhone = stores.filter(s => s.phone && s.phone.length > 0).length;

  document.getElementById('stat-total').textContent = stores.length;
  document.getElementById('stat-prov').textContent = provinces.size;
  document.getElementById('stat-city').textContent = cities.size;
  document.getElementById('stat-phone').textContent = hasPhone;
  document.getElementById('total-num').textContent = stores.length;
  document.getElementById('total-prov').textContent = provinces.size;
  document.getElementById('total-city').textContent = cities.size;
  document.getElementById('result-count').textContent = `显示 ${stores.length} 家门店`;
}

// ============ 省份筛选下拉 ============
function buildProvinceFilter() {
  const provinces = [...new Set(ALL_STORES.map(s => s.province).filter(Boolean))].sort();
  const select = document.getElementById('filter-province');
  provinces.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    select.appendChild(opt);
  });
}

// ============ 筛选逻辑 ============
function onFilterChange() {
  const provVal = document.getElementById('filter-province').value;
  const cityVal = document.getElementById('filter-city').value;
  const searchVal = document.getElementById('filter-search').value.trim().toLowerCase();

  buildCityFilter(provVal);

  let filtered = ALL_STORES.filter(s => {
    if (provVal && s.province !== provVal) return false;
    if (cityVal && s.city !== cityVal && (s.city !== '市辖区' || s.province !== cityVal)) return false;
    if (searchVal) {
      const hay = (s.storeName + s.address + (s.city === '市辖区' ? s.province : s.city) + s.province).toLowerCase();
      if (!hay.includes(searchVal)) return false;
    }
    return true;
  });

  updateStats(filtered);
  renderStoreList(filtered);
  renderMarkers(filtered);

  // 分析图层同步当前筛选结果
  if (heatActive) toggleHeatmap(filtered);
  if (bufferActive) toggleBuffer(filtered);
  if (voronoiActive) toggleVoronoi(filtered);

  if (filtered.length > 0 && filtered.length < ALL_STORES.length) {
    const valid = filtered.filter(s => s.lng && s.lat);
    if (valid.length > 0) {
      const bounds = L.latLngBounds(valid.map(s => [s.lat, s.lng]));
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  }
}

function buildCityFilter(provVal) {
  const citySelect = document.getElementById('filter-city');
  while (citySelect.options.length > 1) citySelect.remove(1);

  let cities = [];
  if (provVal) {
    cities = [...new Set(ALL_STORES.filter(s => s.province === provVal).map(s => {
      return s.city === '市辖区' ? s.province : s.city;
    }))].sort();
  } else {
    cities = [...new Set(ALL_STORES.map(s => s.city === '市辖区' ? s.province : s.city))].sort();
  }
  cities.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    citySelect.appendChild(opt);
  });
}

function resetFilters() {
  document.getElementById('filter-province').value = '';
  document.getElementById('filter-city').value = '';
  document.getElementById('filter-search').value = '';
  buildCityFilter('');
  onFilterChange();
  map.flyTo([35.0, 105.0], 5);
}

// ============ 视图切换 ============
function switchView(view) {
  currentView = view;
  const listEl = document.getElementById('store-list-wrapper');
  const chartEl = document.getElementById('chart-view');
  const tabs = document.querySelectorAll('.tab-btn');

  tabs.forEach((t, i) => t.classList.toggle('active', i === (view === 'list' ? 0 : 1)));

  if (view === 'list') {
    listEl.style.display = 'block';
    chartEl.classList.remove('active');
    setTimeout(() => map.invalidateSize(), 100);
  } else {
    listEl.style.display = 'none';
    chartEl.classList.add('active');
    renderCharts();
  }
}

// ============ Chart.js 图表 ============
function renderCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // TOP 15 省份
  const provCnt = {};
  ALL_STORES.forEach(s => { provCnt[s.province] = (provCnt[s.province] || 0) + 1; });
  const topProv = Object.entries(provCnt).sort((a,b) => b[1]-a[1]).slice(0, 15);

  charts.province = new Chart(document.getElementById('chart-province'), {
    type: 'bar',
    data: {
      labels: topProv.map(x => x[0]),
      datasets: [{
        label: '门店数量',
        data: topProv.map(x => x[1]),
        backgroundColor: 'rgba(0, 214, 202, 0.7)',
        borderColor: 'rgba(0, 150, 136, 1)',
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });

  // TOP 20 城市（横向）
  const cityCnt = {};
  ALL_STORES.forEach(s => { var c = (s.city === '市辖区') ? s.province : s.city; cityCnt[c] = (cityCnt[c] || 0) + 1; });
  const topCity = Object.entries(cityCnt).sort((a,b) => b[1]-a[1]).slice(0, 20);

  charts.city = new Chart(document.getElementById('chart-city'), {
    type: 'bar',
    data: {
      labels: topCity.map(x => x[0]),
      datasets: [{
        label: '门店数量',
        data: topCity.map(x => x[1]),
        backgroundColor: 'rgba(102, 126, 234, 0.7)',
        borderColor: 'rgba(102, 126, 234, 1)',
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, grid: { color: '#f0f0f0' } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });

  // 省份柱状图（全部省份）
  charts.heatmap = new Chart(document.getElementById('chart-heatmap'), {
    type: 'bar',
    data: {
      labels: topProv.map(x => x[0]),
      datasets: [{
        label: '门店数量',
        data: topProv.map(x => x[1]),
        backgroundColor: topProv.map((_, i) => {
          const colors = [
            'rgba(250,112,154,0.8)', 'rgba(240,147,251,0.8)', 'rgba(102,126,234,0.8)',
            'rgba(0,214,202,0.8)', 'rgba(0,150,136,0.8)',
            'rgba(250,112,154,0.6)', 'rgba(240,147,251,0.6)', 'rgba(102,126,234,0.6)',
            'rgba(0,214,202,0.6)', 'rgba(0,150,136,0.6)',
            'rgba(250,112,154,0.5)', 'rgba(240,147,251,0.5)', 'rgba(102,126,234,0.5)'
          ];
          return colors[i % colors.length];
        }),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } }
      }
    }
  });
}

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', init);
</script>
